<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 보고서</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f5f5f5; font-family: sans-serif; }

  #loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 16px;
    color: #666;
    font-size: 14px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid #e0e0e0;
    border-top-color: #333;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #error {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 12px;
    color: #d93025;
    font-size: 14px;
    text-align: center;
    padding: 2rem;
  }

  #content { display: none; width: 100%; }

  iframe {
    width: 100%;
    height: 100vh;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span>보고서 불러오는 중...</span>
</div>

<div id="error">
  <span style="font-size:32px;">⚠</span>
  <span id="error-msg">보고서를 불러올 수 없습니다.</span>
  <span style="color:#999;font-size:12px;">URL이 만료됐거나 잘못된 링크입니다.</span>
</div>

<div id="content">
  <iframe id="report-frame" sandbox="allow-same-origin allow-scripts"></iframe>
</div>

<script>
(async () => {
  const params = new URLSearchParams(window.location.search);
  const encoded = params.get('r');

  if (!encoded) {
    showError('잘못된 링크입니다.');
    return;
  }

  let fileUrl;
  try {
    fileUrl = atob(encoded);
  } catch(e) {
    showError('링크가 손상됐습니다.');
    return;
  }

  try {
    const res = await fetch(fileUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const html = await res.text();
    const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
    const blobUrl = URL.createObjectURL(blob);

    const frame = document.getElementById('report-frame');
    frame.src = blobUrl;
    frame.onload = () => {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('content').style.display = 'block';
    };
  } catch(e) {
    showError(e.message);
  }
})();

function showError(msg) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').style.display = 'flex';
}
</script>
</body>
</html>
